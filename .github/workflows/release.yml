name: Release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci
      - run: npm run check
      - run: npm run build

      - name: Build and publish signed Tauri update
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LlamaLauncher ${{ github.ref_name }}"
          releaseBody: "See the assets below for the Windows installer and signed updater packages."
          releaseDraft: true
          prerelease: true
          args: --bundles nsis

      - name: Verify signed updater assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = gh release view $env:GITHUB_REF_NAME --json assets --jq '.assets[].name'
          $required = @(
            "llama-launcher_${{ github.ref_name }}_x64-setup.exe" -replace '_v', '_'
            "llama-launcher_${{ github.ref_name }}_x64-setup.nsis.zip" -replace '_v', '_'
            "llama-launcher_${{ github.ref_name }}_x64-setup.nsis.zip.sig" -replace '_v', '_'
            "latest.json"
          )
          $missing = $required | Where-Object { $_ -notin $assets }
          if ($missing) {
            throw "Release is missing signed updater assets: $($missing -join ', ')"
          }
